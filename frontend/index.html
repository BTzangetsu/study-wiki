<!-- index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- viewport est critique pour le responsive :
         width=device-width → la page prend la largeur de l'écran
         initial-scale=1.0  → pas de zoom par défaut sur mobile -->
    <title>Annales.io — Partage d'annales étudiantes</title>
    <link rel="stylesheet" href="css/base.css">
    <!-- On charge les scripts en bas de body (pas ici dans le head)
         pour ne pas bloquer le rendu de la page -->
</head>

<!-- data-api pointe vers le backend.
     api.js lit cette valeur via document.body.dataset.api
     Changer cette valeur = changer l'URL du backend pour toutes les pages -->
<body data-api="http://localhost:8080">

    <!-- ============================================================
         NAVBAR
         data-auth   : visible seulement si connecté (géré par auth.js)
         data-noauth : visible seulement si non connecté
         data-admin  : visible seulement si admin
         ============================================================ -->
    <nav class="navbar">
        <div class="navbar-inner">

            <!-- Logo -->
            <a href="index.html" class="navbar-logo">
                annales<span>.io</span>
            </a>

            <!-- Liens de navigation -->
            <div class="navbar-links">
                <a href="index.html"       class="navbar-link active">Documents</a>
                <a href="leaderboard.html" class="navbar-link">Classements</a>
                <a href="suggestions.html" class="navbar-link">Suggestions</a>

                <!-- Visible seulement si connecté -->
                <a href="profile.html" class="navbar-link" data-auth
                   id="nav-username">Mon profil</a>

                <!-- Visible seulement si admin -->
                <a href="admin.html" class="navbar-link" data-admin>
                    Admin
                </a>

                <!-- Visible seulement si connecté -->
                <a href="upload.html" data-auth>
                    <button class="btn btn-primary btn-sm">
                        Uploader
                    </button>
                </a>

                <!-- Visible seulement si non connecté -->
                <div class="flex gap-2" data-noauth>
                    <a href="login.html">
                        <button class="btn btn-secondary btn-sm">
                            Connexion
                        </button>
                    </a>
                    <a href="register.html">
                        <button class="btn btn-primary btn-sm">
                            S'inscrire
                        </button>
                    </a>
                </div>

                <!-- Bouton déconnexion — visible seulement si connecté -->
                <button class="btn btn-secondary btn-sm"
                        data-auth
                        onclick="logout()">
                    Déconnexion
                </button>
            </div>

        </div>
    </nav>

    <!-- ============================================================
         CONTENU PRINCIPAL
         <main> est une balise sémantique — indique aux moteurs
         de recherche et aux lecteurs d'écran où est le contenu
         principal de la page.
         ============================================================ -->
    <main>
        <div class="container">

            <!-- HERO — section d'introduction -->
            <section class="hero">
                <!-- Le label bleu en pill au-dessus du titre -->
                <span class="badge badge-blue">Plateforme étudiante</span>
                <h1>Retrouve tes annales,<br>aide les prochaines promo.</h1>
                <p class="text-muted" style="max-width:480px; margin-top:8px">
                    Des milliers de sujets d'examens, TD et cours
                    partagés entre étudiants.
                </p>
            </section>

            <!-- BARRE DE FILTRES -->
            <section class="filters-bar">

                <!-- Barre de recherche texte -->
                <input
                    type="text"
                    id="filter-search"
                    class="form-input"
                    placeholder="Rechercher un sujet, une matière…"
                    style="max-width:300px"
                >

                <!-- Select école — les options sont remplies par JS -->
                <select id="filter-school" class="form-select"
                        style="width:auto">
                    <option value="">Toutes les écoles</option>
                </select>

                <!-- Select matière — les options sont remplies par JS -->
                <select id="filter-subject" class="form-select"
                        style="width:auto">
                    <option value="">Toutes les matières</option>
                </select>

                <!-- Select année — JS remplit de 2015 à l'année courante -->
                <select id="filter-year" class="form-select"
                        style="width:auto">
                    <option value="">Année</option>
                </select>

                <!-- Boutons pills pour filtrer par type -->
                <!-- data-type est lu par JS pour construire le filtre -->
                <div class="type-pills" id="type-pills">
                    <button class="pill active" data-type="">Tout</button>
                    <button class="pill" data-type="exam">Exam</button>
                    <button class="pill" data-type="td">TD</button>
                    <button class="pill" data-type="cours">Cours</button>
                    <button class="pill" data-type="tp">TP</button>
                </div>

            </section>

            <!-- LAYOUT PRINCIPAL : colonne gauche + sidebar droite -->
            <!-- grid-template-columns définit les colonnes :
                 minmax(0, 1fr) → colonne flexible qui peut rétrécir à 0
                 240px          → sidebar de largeur fixe -->
            <!-- Remplacer la div .page-layout existante par ceci -->
            <div class="page-layout" id="main-layout">

                <!-- LISTE + PAGINATION -->
                <div class="list-col">
                    <div id="docs-state"></div>
                    <div id="docs-list"></div>
                    <div class="pagination" id="pagination"></div>
                </div>

                <!-- PANNEAU DÉTAIL — caché par défaut -->
                <div class="detail-panel" id="detail-panel">
                    <div class="detail-panel-inner" id="detail-panel-inner">

                        <div class="detail-panel-header">
                            <h4 id="panel-title" class="truncate"></h4>
                            <button class="panel-close-btn"
                                    id="btn-close-panel"
                                    aria-label="Fermer">✕</button>
                        </div>

                        <div class="detail-panel-meta" id="panel-meta"></div>
                        <div class="detail-panel-stars" id="panel-stars"></div>
                        <div class="detail-panel-desc" id="panel-desc"></div>

                        <div class="panel-actions">
                            <button class="btn btn-secondary btn-full btn-sm"
                                    id="btn-panel-preview">
                                👁 Aperçu
                            </button>
                            <button class="btn btn-primary btn-full btn-sm"
                                    id="btn-panel-download"
                                    data-auth>
                                Télécharger
                            </button>
                            <a href="login.html" data-noauth>
                                <button class="btn btn-secondary btn-full btn-sm">
                                    Connecte-toi pour télécharger
                                </button>
                            </a>
                            <button class="btn btn-secondary btn-full btn-sm"
                                    id="btn-panel-favorite"
                                    data-auth>
                                ♡ Favori
                            </button>
                        </div>

                        <div class="divider"></div>

                        <!-- Vote étoiles -->
                        <div class="vote-zone" data-auth id="panel-vote-zone">
                            <span class="text-muted text-sm">Ta note :</span>
                            <div class="star-rating" id="panel-stars-input">
                                <button class="star" data-value="1">★</button>
                                <button class="star" data-value="2">★</button>
                                <button class="star" data-value="3">★</button>
                                <button class="star" data-value="4">★</button>
                                <button class="star" data-value="5">★</button>
                            </div>
                        </div>

                        <div class="divider"></div>

                        <!-- Commentaires résumés -->
                        <p class="sidebar-title">Commentaires</p>
                        <div id="panel-comments"></div>
                        <a id="btn-see-all-comments" href="#">
                            <span class="link text-sm">
                                Voir tous les commentaires →
                            </span>
                        </a>

                    </div>
                </div>

            </div>

            <!-- VIEWER OVERLAY — en dehors du layout pour couvrir toute la page -->
            <div class="viewer-overlay" id="viewer-overlay">
                <div class="viewer-modal">
                    <div class="viewer-toolbar">
                        <span class="viewer-modal-title"
                            id="viewer-modal-title"></span>
                        <button class="viewer-close-btn"
                                id="btn-close-viewer">✕</button>
                    </div>
                    <!-- Contenu injecté par JS selon le type de fichier -->
                    <div class="viewer-body" id="viewer-body"></div>
                    <div class="viewer-footer">
                        <span class="text-muted text-sm"
                            id="viewer-page-info"></span>
                        <button class="btn btn-primary btn-sm"
                                id="btn-viewer-download">
                            Télécharger
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- ============================================================
         SCRIPTS — chargés en bas de body pour ne pas bloquer
         le rendu HTML. L'ordre est important :
         1. api.js    — doit être chargé avant auth.js et index.js
         2. auth.js   — doit être chargé avant index.js
         3. index.js  — utilise les fonctions des deux précédents
         ============================================================ -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/index.js"></script>

</body>
</html>
