# ============================================================
# FRONTEND — fichiers statiques
# ============================================================
server {
    listen 80;
    server_name study-wiki.katnr.com;

    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name study-wiki.katnr.com;

    ssl_certificate     /etc/letsencrypt/live/study-wiki.katnr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/study-wiki.katnr.com/privkey.pem;

    # Dossier des fichiers statiques frontend
    root /var/www/study-wiki/frontend;
    index index.html;

    # try_files tente de servir le fichier demandé,
    # sinon retourne index.html (utile si tu ajoutes
    # du routing côté client plus tard)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressif sur les assets (CSS/JS) —
    # le navigateur ne les re-télécharge pas si inchangés
    location ~* \.(css|js|woff2|png|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================
# BACKEND — proxy vers le conteneur C++
# ============================================================
server {
    listen 80;
    server_name api.study-wiki.katnr.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.study-wiki.katnr.com;

    ssl_certificate     /etc/letsencrypt/live/api.study-wiki.katnr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.study-wiki.katnr.com/privkey.pem;

    location / {
        # study-wiki-backend = nom du conteneur sur le réseau Docker
        proxy_pass http://study-wiki-backend:8080;

        # Ces headers transmettent l'IP réelle du client
        # au backend (sinon le rate limiter voit l'IP de nginx)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout généreux pour les uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}